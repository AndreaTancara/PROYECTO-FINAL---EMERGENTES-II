{% extends 'base.html' %}

{% block title %}Crear Nuevo Usuario{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-user-plus me-2"></i> Crear Nuevo Usuario</h5>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('bp_usuario.create') }}" method="POST">

                        {# Campo de Nombre de Usuario #}
                        <div class="mb-3">
                            <label for="username" class="form-label">Nombre de usuario</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>

                        {# Campo de Contraseña #}
                        <div class="mb-3">
                            <label for="password" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>

                        {# Selector de Rol #}
                        <div class="mb-3">
                            <label for="rol_id" class="form-label">Rol del sistema</label>
                            <select class="form-select" id="rol_id" name="rol_id" required>
                                {% for rol in roles %}
                                <option value="{{ rol.id }}">{{ rol.nombre_rol }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="{{ url_for('bp_usuario.index') }}" class="btn btn-secondary me-md-2">Cancelar</a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save me-1"></i> Crear Usuario
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
