{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark">
                <h3 class="card-title mb-0 h5">Modificar Datos del Usuario</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('bp_usuario.edit', id=usuario.id) }}" method="POST">

                    <div class="mb-3">
                        <label for="username" class="form-label">Nombre de usuario:</label>
                        <input type="text" id="username" name="username" class="form-control"
                            value="{{ usuario.username }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Rol:</label>
                        <select name="rol_id" class="form-control" required>
                            {% for rol in roles %}
                            <option value="{{ rol.id }}" {% if rol.id==usuario.rol_id %}selected{% endif %}>
                                {{ rol.nombre_rol }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3 border-top pt-3">
                        <label for="password" class="form-label text-muted">Nueva contraseña (opcional):</label>
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Dejar vacío para no cambiar">
                        <small class="text-muted">Solo escribe si deseas restablecer la contraseña del usuario.</small>
                    </div>
                    <div class="d-flex justify-content-between pt-2">
                        <a href="{{ url_for('bp_usuario.index') }}" class="btn btn-secondary">Volver al listado</a>
                        <button type="submit" class="btn btn-warning">Actualizar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
