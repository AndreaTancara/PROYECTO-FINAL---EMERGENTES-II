{% extends "base.html" %}
{% block content %}
<div class="page-card mx-auto" style="max-width: 720px;">
    <h1 class="h4 fw-bold mb-3">Registrar gasto</h1>
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Fecha</label>
                <input type="date" name="fecha" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Tipo</label>
                <input type="text" name="tipo" class="form-control" value="Repartidor" list="tipos-gasto">
            </div>
            <div class="col-12">
                <label class="form-label">Descripcion</label>
                <input type="text" name="descripcion" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Monto</label>
                <input type="number" step="0.01" name="monto" class="form-control" required>
            </div>
        </div>
        <div class="d-flex justify-content-between mt-4">
            <a href="{{ url_for('bp_gasto.index') }}" class="btn btn-secondary">Cancelar</a>
            <button class="btn btn-primary">Guardar gasto</button>
        </div>
        <datalist id="tipos-gasto">
            <option value="Repartidor">
            <option value="Taxi">
            <option value="Empaque">
            <option value="Publicidad">
        </datalist>
    </form>
</div>
{% endblock %}
