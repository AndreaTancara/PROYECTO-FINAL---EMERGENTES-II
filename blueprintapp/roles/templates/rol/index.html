{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0 text-gray-800">
        <i class="fas fa-user-shield text-primary"></i> Listado de Roles
    </h1>
    <a href="{{ url_for('bp_role.create') }}" class="btn btn-primary shadow-sm">+ Nuevo Rol</a>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover table-striped mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th scope="col" class="ps-4">ID</th>
                        <th scope="col">Nombre del Rol</th>
                        <th scope="col" class="text-end pe-4">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for rol in roles %}
                    <tr>
                        <td class="ps-4 fw-bold">{{ rol.id }}</td>
                        <td>{{ rol.nombre_rol }}</td>
                        <td class="text-end pe-4">
                            <a href="{{ url_for('bp_role.edit', id=rol.id) }}"
                                class="btn btn-sm btn-outline-warning me-2">Editar</a>

                            <form action="{{ url_for('bp_role.delete', id=rol.id) }}" method="POST"
                                style="display:inline;">
                                <button type="submit" class="btn btn-sm btn-outline-danger"
                                    onclick="return confirm('¿Estás seguro de eliminar este rol?')">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
