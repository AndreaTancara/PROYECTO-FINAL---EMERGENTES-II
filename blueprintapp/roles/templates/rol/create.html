{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0 h5">
                    <i class="fas fa-plus-circle"></i> Registrar Nuevo Rol
                </h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('bp_role.create') }}" method="POST">

                    <div class="mb-3">
                        <label for="nombre_rol" class="form-label">Nombre del Rol:</label>
                        <input type="text" id="nombre_rol" name="nombre_rol" class="form-control"
                            placeholder="Ej: Administrador, Vendedor" required>
                    </div>

                    <div class="d-flex justify-content-between pt-3">
                        <a href="{{ url_for('bp_role.index') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary shadow-sm">Guardar Rol</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
