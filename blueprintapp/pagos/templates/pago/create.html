{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0 h5">Registrar nuevo pago</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('bp_pago.create') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Pedido:</label>
                        <select name="pedido_id" class="form-select" required>
                            <option value="">Selecciona un pedido</option>
                            {% for pedido in pedidos %}
                            <option value="{{ pedido.id }}">Pedido #{{ pedido.id }} - Total {{ '%.2f'|format(pedido.total) }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Monto:</label>
                        <input type="number" step="0.01" name="monto" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Método de pago:</label>
                        <select name="metodo" class="form-select" required>
                            <option value="QR">QR</option>
                            <option value="Efectivo">Efectivo</option>
                            <option value="Transferencia">Transferencia</option>
                        </select>
                    </div>
                    <div class="d-flex justify-content-between pt-2">
                        <a href="{{ url_for('bp_pago.index') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Registrar pago</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
