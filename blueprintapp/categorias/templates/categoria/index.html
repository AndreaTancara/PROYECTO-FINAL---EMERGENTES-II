{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="h3 fw-bold mb-1">Catalogo</h1>
        <p class="text-muted mb-0">Categorias para ordenar los productos.</p>
    </div>
    <a href="{{ url_for('bp_categoria.create') }}" class="btn btn-primary"><i class="fas fa-plus me-1"></i>Nueva categoria</a>
</div>

<div class="page-card">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
            <thead><tr><th>ID</th><th>Nombre</th><th class="text-end">Acciones</th></tr></thead>
            <tbody>
                {% for item in categorias %}
                <tr>
                    <td><span class="badge text-bg-light">{{ item.id }}</span></td>
                    <td>{{ item.nombre }}</td>
                    <td class="text-end">
                        <a href="{{ url_for('bp_categoria.edit', id=item.id) }}" class="btn btn-sm btn-outline-primary">Editar</a>
                        <form action="{{ url_for('bp_categoria.delete', id=item.id) }}" method="POST" class="d-inline" onsubmit="return confirm('Seguro que deseas eliminar esta categoria?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="3" class="text-center text-muted py-4">No hay categorias registradas.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
