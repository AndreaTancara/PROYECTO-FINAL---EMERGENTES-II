{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0 h5">Registrar Nueva Categoría</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('bp_categoria.create') }}" method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre de la Categoría:</label>
                        <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Ej. Juan Pérez"
                            required>
                    </div>

                    <div class="d-flex justify-content-between pt-2">
                        <a href="{{ url_for('bp_categoria.index') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar Categoría</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
