{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0 h5">Registrar Nuevo Pedido</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('bp_pedido.create') }}" method="POST">

                    {# Cliente #}
                    <div class="mb-3">
                        <label for="cliente_id" class="form-label">Cliente:</label>
                        <select id="cliente_id" name="cliente_id" class="form-select" required>
                            <option value="">-- Seleccione un cliente --</option>
                            {% for cliente in clientes %}
                            <option value="{{ cliente.id }}">{{ cliente.nombre_completo or cliente.telefono }} - {{ cliente.ciudad or 'Sin ciudad' }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3 d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Productos del pedido</h5>
                        <button type="button" class="btn btn-sm btn-outline-primary" id="add-item">Agregar producto</button>
                    </div>

                    <div class="table-responsive mb-4">
                        <table class="table align-middle" id="pedido-items-table">
                            <thead class="table-light">
                                <tr>
                                    <th>Producto</th>
                                    <th>Cantidad</th>
                                    <th>Precio</th>
                                    <th>Descuento</th>
                                    <th class="text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>
                                        <select name="producto_id" class="form-select" required>
                                            <option value="">-- Seleccione un producto --</option>
                                            {% for prod in productos %}
                                            <option value="{{ prod.id }}" data-precio="{{ prod.precio_live or prod.precio_normal }}">{{ prod.nombre }} (Stock: {{ prod.stock_actual }} | Live: {{ '%.2f'|format(prod.precio_live or prod.precio_normal) }})</option>
                                            {% endfor %}
                                        </select>
                                    </td>
                                    <td>
                                        <input type="number" name="cantidad" class="form-control" min="1" value="1" required>
                                    </td>
                                    <td>
                                        <input type="number" step="0.01" name="precio_venta" class="form-control" placeholder="0.00" required>
                                    </td>
                                    <td>
                                        <input type="number" step="0.01" name="descuento_item" class="form-control" placeholder="0.00">
                                    </td>
                                    <td class="text-center">
                                        <button type="button" class="btn btn-sm btn-outline-danger remove-item">X</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="adelanto" class="form-label">Adelanto:</label>
                            <input type="number" step="0.01" id="adelanto" name="adelanto" class="form-control" placeholder="0.00">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="estado" class="form-label">Estado inicial:</label>
                            <select id="estado" name="estado" class="form-select" required>
                                {% for estado in estados %}
                                <option value="{{ estado }}">{{ estado }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="observaciones" class="form-label">Observaciones:</label>
                        <textarea id="observaciones" name="observaciones" class="form-control" rows="3" placeholder="Notas internas"></textarea>
                    </div>
                    <div class="alert alert-light border d-flex justify-content-between">
                        <strong>Total estimado: <span id="total-estimado">0.00</span></strong>
                        <strong>Saldo estimado: <span id="saldo-estimado">0.00</span></strong>
                    </div>

                    <div class="d-flex justify-content-between pt-2">
                        <a href="{{ url_for('bp_pedido.index') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar Pedido</button>
                    </div>
                </form>

                <script>
                    const addItemBtn = document.getElementById('add-item');
                    const itemsTable = document.querySelector('#pedido-items-table tbody');
                    const templateRow = itemsTable.querySelector('tr').cloneNode(true);

                    addItemBtn.addEventListener('click', () => {
                        const newRow = templateRow.cloneNode(true);
                        newRow.querySelectorAll('input').forEach(input => input.value = '');
                        newRow.querySelector('select').selectedIndex = 0;
                        itemsTable.appendChild(newRow);
                        bindRemoveButtons();
                    });

                    function bindRemoveButtons() {
                        itemsTable.querySelectorAll('.remove-item').forEach(button => {
                            button.removeEventListener('click', removeRow);
                            button.addEventListener('click', removeRow);
                        });
                        document.querySelectorAll('input[name="cantidad"], input[name="precio_venta"], input[name="descuento_item"], #adelanto')
                            .forEach(input => {
                                input.removeEventListener('input', calcularTotales);
                                input.addEventListener('input', calcularTotales);
                            });
                        document.querySelectorAll('select[name="producto_id"]').forEach(select => {
                            select.removeEventListener('change', aplicarPrecioProducto);
                            select.addEventListener('change', aplicarPrecioProducto);
                        });
                    }

                    function removeRow(event) {
                        const row = event.target.closest('tr');
                        if (itemsTable.rows.length > 1) {
                            row.remove();
                            calcularTotales();
                        }
                    }

                    function calcularTotales() {
                        let total = 0;
                        itemsTable.querySelectorAll('tr').forEach(row => {
                            const cantidad = parseFloat(row.querySelector('input[name="cantidad"]').value || 0);
                            const precio = parseFloat(row.querySelector('input[name="precio_venta"]').value || 0);
                            const descuento = parseFloat(row.querySelector('input[name="descuento_item"]').value || 0);
                            total += Math.max(0, cantidad * precio - descuento);
                        });
                        const adelanto = parseFloat(document.getElementById('adelanto').value || 0);
                        document.getElementById('total-estimado').textContent = total.toFixed(2);
                        document.getElementById('saldo-estimado').textContent = Math.max(0, total - adelanto).toFixed(2);
                    }

                    function aplicarPrecioProducto(event) {
                        const row = event.target.closest('tr');
                        const selected = event.target.selectedOptions[0];
                        const precio = selected ? selected.dataset.precio : '';
                        if (precio) {
                            row.querySelector('input[name="precio_venta"]').value = parseFloat(precio).toFixed(2);
                        }
                        calcularTotales();
                    }

                    bindRemoveButtons();
                    calcularTotales();
                </script>
            </div>
        </div>
    </div>
</div>
{% endblock %}
