{% extends 'base.html' %}

{% block content %}
<div class="page-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 fw-bold mb-0">Editar pedido #{{ pedido.id }}</h1>
        <a href="{{ url_for('bp_pedido.view', id=pedido.id) }}" class="btn btn-outline-secondary">Volver</a>
    </div>
    <form method="POST" action="{{ url_for('bp_pedido.edit', id=pedido.id) }}">
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label">Cliente</label>
                <select name="cliente_id" class="form-select" required>
                    {% for cliente in clientes %}
                    <option value="{{ cliente.id }}" {% if pedido.cliente_id == cliente.id %}selected{% endif %}>{{ cliente.nombre_completo or cliente.telefono }} - {{ cliente.ciudad or 'Sin ciudad' }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Adelanto</label>
                <input type="number" step="0.01" name="adelanto" value="{{ pedido.adelanto }}" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label">Estado</label>
                <select name="estado" class="form-select">
                    {% for estado in estados %}
                    <option value="{{ estado }}" {% if pedido.estado == estado %}selected{% endif %}>{{ estado }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="h5 mb-0">Productos</h2>
            <button type="button" class="btn btn-sm btn-outline-primary" id="add-item">Agregar producto</button>
        </div>
        <div class="table-responsive mb-3">
            <table class="table align-middle" id="pedido-items-table">
                <thead><tr><th>Producto</th><th>Cantidad</th><th>Precio</th><th>Descuento</th><th></th></tr></thead>
                <tbody>
                    {% for detalle in pedido.detalles %}
                    <tr>
                        <td>
                            <select name="producto_id" class="form-select" required>
                                {% for prod in productos %}
                                <option value="{{ prod.id }}" data-precio="{{ prod.precio_live or prod.precio_normal }}" {% if detalle.producto_id == prod.id %}selected{% endif %}>{{ prod.nombre }} (Stock: {{ prod.stock_actual }} | Live: {{ '%.2f'|format(prod.precio_live or prod.precio_normal) }})</option>
                                {% endfor %}
                            </select>
                        </td>
                        <td><input type="number" name="cantidad" class="form-control" min="1" value="{{ detalle.cantidad }}" required></td>
                        <td><input type="number" step="0.01" name="precio_venta" class="form-control" value="{{ detalle.precio_unitario }}" required></td>
                        <td><input type="number" step="0.01" name="descuento_item" class="form-control" value="{{ detalle.descuento_item }}"></td>
                        <td><button type="button" class="btn btn-sm btn-outline-danger remove-item">X</button></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="mb-3">
            <label class="form-label">Observaciones</label>
            <textarea name="observaciones" class="form-control" rows="3">{{ pedido.observaciones or '' }}</textarea>
        </div>
        <div class="alert alert-light border d-flex justify-content-between">
            <strong>Total estimado: <span id="total-estimado">0.00</span></strong>
            <strong>Saldo estimado: <span id="saldo-estimado">0.00</span></strong>
        </div>
        <div class="d-flex justify-content-between">
            <a href="{{ url_for('bp_pedido.view', id=pedido.id) }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Guardar cambios</button>
        </div>
    </form>
</div>

<script>
    const itemsTable = document.querySelector('#pedido-items-table tbody');
    const templateRow = itemsTable.querySelector('tr').cloneNode(true);
    document.getElementById('add-item').addEventListener('click', () => {
        const row = templateRow.cloneNode(true);
        row.querySelectorAll('input').forEach(input => input.value = input.name === 'cantidad' ? '1' : '');
        row.querySelector('select').selectedIndex = 0;
        itemsTable.appendChild(row);
        bindRemoveButtons();
    });
    function bindRemoveButtons() {
        itemsTable.querySelectorAll('.remove-item').forEach(button => {
            button.onclick = () => {
                if (itemsTable.rows.length > 1) button.closest('tr').remove();
                calcularTotales();
            };
        });
        document.querySelectorAll('input[name="cantidad"], input[name="precio_venta"], input[name="descuento_item"], input[name="adelanto"]')
            .forEach(input => input.oninput = calcularTotales);
        document.querySelectorAll('select[name="producto_id"]').forEach(select => select.onchange = aplicarPrecioProducto);
    }
    function calcularTotales() {
        let total = 0;
        itemsTable.querySelectorAll('tr').forEach(row => {
            const cantidad = parseFloat(row.querySelector('input[name="cantidad"]').value || 0);
            const precio = parseFloat(row.querySelector('input[name="precio_venta"]').value || 0);
            const descuento = parseFloat(row.querySelector('input[name="descuento_item"]').value || 0);
            total += Math.max(0, cantidad * precio - descuento);
        });
        const adelanto = parseFloat(document.querySelector('input[name="adelanto"]').value || 0);
        document.getElementById('total-estimado').textContent = total.toFixed(2);
        document.getElementById('saldo-estimado').textContent = Math.max(0, total - adelanto).toFixed(2);
    }
    function aplicarPrecioProducto(event) {
        const row = event.target.closest('tr');
        const selected = event.target.selectedOptions[0];
        const precio = selected ? selected.dataset.precio : '';
        if (precio) row.querySelector('input[name="precio_venta"]').value = parseFloat(precio).toFixed(2);
        calcularTotales();
    }
    bindRemoveButtons();
    calcularTotales();
</script>
{% endblock %}
