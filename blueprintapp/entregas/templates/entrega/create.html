{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="card-title mb-0 h5">Registrar entrega</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('bp_entrega.create') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Pedido:</label>
                        <select name="pedido_id" class="form-select" required>
                            <option value="">Selecciona un pedido</option>
                            {% for pedido in pedidos %}
                            <option value="{{ pedido.id }}">Pedido #{{ pedido.id }} - {{ pedido.total }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Fecha de entrega:</label>
                            <input type="date" name="fecha_entrega" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Hora de entrega:</label>
                            <input type="time" name="hora" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Lugar:</label>
                        <select name="lugar" class="form-select" required>
                            <option value="">Selecciona un lugar</option>
                            {% for lugar in lugares %}
                            <option value="{{ lugar }}">{{ lugar }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Lugar personalizado:</label>
                        <input type="text" name="lugar_personalizado" class="form-control" placeholder="Opcional, reemplaza al punto rapido">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Estado:</label>
                        <select name="estado" class="form-select" required>
                            {% for estado in estados %}
                            <option value="{{ estado }}">{{ estado }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Responsable:</label>
                        <input type="text" name="responsable" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Observaciones:</label>
                        <textarea name="observaciones" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="d-flex justify-content-between pt-2">
                        <a href="{{ url_for('bp_entrega.index') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar entrega</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
